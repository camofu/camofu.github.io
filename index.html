<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carlo Modica</title>
<link rel="stylesheet" href="landing.css">
</head>
<body>

<header class="top-bar">
  <span class="name">Carlo Modica</span>
  <a href="about.html" class="about-link">About →</a>
</header>

<main class="stage">

  <div class="portrait">
    <img src="carlo.png" alt="Portrait of Carlo Modica">
  </div>

  <p class="intro">Ask me anything.</p>

  <section class="chat" aria-label="Chat with Carlo">
    <div class="messages" id="messages" role="log" aria-live="polite">
      <div class="msg msg-bot">Hi — I'm a chatbot version of Carlo. Ask me about cryptography, ZK proofs, or what I've worked on.</div>
    </div>
    <form class="composer" id="composer" autocomplete="off">
      <input
        type="text"
        id="input"
        name="message"
        placeholder="Type a message…"
        aria-label="Message"
        required
      />
      <button type="submit" aria-label="Send">Send</button>
    </form>
    <p class="hint">Backend not wired yet — Mistral integration coming soon.</p>
  </section>

</main>

<script>
  const form = document.getElementById('composer');
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    const userMsg = document.createElement('div');
    userMsg.className = 'msg msg-user';
    userMsg.textContent = text;
    messages.appendChild(userMsg);

    const botMsg = document.createElement('div');
    botMsg.className = 'msg msg-bot';
    botMsg.textContent = '(Mistral backend not connected yet.)';
    messages.appendChild(botMsg);

    input.value = '';
    messages.scrollTop = messages.scrollHeight;
  });
</script>

</body>
</html>
