<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carlo Modica</title>
<link rel="stylesheet" href="landing.css">
</head>
<body>

<header class="top-bar">
  <span class="name">Carlo Modica</span>
  <a href="about.html" class="about-link">About →</a>
</header>

<main class="stage">

  <div class="portrait">
    <img src="carlo.png" alt="Portrait of Carlo Modica">
  </div>

  <p class="intro">Ask me anything. But like, please be kind with me because I am still a WIP project right now, so probably I will not sound like the sharpest tool in the shed.</p>

  <section class="chat" aria-label="Chat with Carlo">
    <div class="messages" id="messages" role="log" aria-live="polite">
      <div class="msg msg-bot">Hi — I'm a chatbot version of Carlo. Ask me about cryptography, ZK proofs, or what I've worked on.</div>
    </div>
    <form class="composer" id="composer" autocomplete="off">
      <input
        type="text"
        id="input"
        name="message"
        placeholder="Type a message…"
        aria-label="Message"
        maxlength="800"
        required
      />
      <button type="submit" id="send" aria-label="Send">Send</button>
    </form>
    <p class="hint" id="hint"></p>
  </section>

</main>

<script>
  // Cloudflare quick tunnel — rotates every cloudflared restart.
  // Switch to a stable named tunnel when ready.
  const API_URL = "https://lance-cope-chairman-determination.trycloudflare.com/chat";
  const MAX_HISTORY_TURNS = 6;

  const form = document.getElementById('composer');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const messages = document.getElementById('messages');
  const hint = document.getElementById('hint');

  const history = [];

  function append(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'msg-user' : 'msg-bot');
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    append('user', text);
    input.value = '';
    history.push({ role: 'user', content: text });

    send.disabled = true;
    const pending = append('bot', '…');
    hint.textContent = '';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          history: history.slice(0, -1).slice(-2 * MAX_HISTORY_TURNS),
        }),
      });

      if (res.status === 429) {
        pending.textContent = "I'm rate-limited right now — give me a minute.";
        history.pop();
        return;
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const data = await res.json();
      pending.textContent = data.reply;
      history.push({ role: 'assistant', content: data.reply });
      history.splice(0, Math.max(0, history.length - 2 * MAX_HISTORY_TURNS));
    } catch (err) {
      pending.textContent = "I'm offline right now — try again later.";
      history.pop();
    } finally {
      send.disabled = false;
      input.focus();
    }
  });
</script>

</body>
</html>
